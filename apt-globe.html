<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APT World Map — Advanced Persistent Threat Intelligence Globe</title>
<meta name="description" content="Interactive 3D globe visualization of state-sponsored APT groups worldwide.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>

<style>
/* ===== APT Globe — Dark Cyber Intelligence Theme ===== */

:root {
  /* Colors */
  --bg-deep: #0a0a0f;
  --bg-surface: #0e0e16;
  --bg-surface-2: #14141e;
  --bg-surface-3: #1a1a28;
  --bg-hover: #1e1e2e;
  --border: rgba(255, 255, 255, 0.06);
  --border-accent: rgba(0, 212, 255, 0.15);

  --text-primary: #e8e8ef;
  --text-muted: #8888a0;
  --text-faint: #555570;

  --accent: #00d4ff;
  --accent-dim: rgba(0, 212, 255, 0.15);
  --accent-glow: rgba(0, 212, 255, 0.3);

  /* Country colors */
  --color-russia: #ff2a2a;
  --color-china: #ff6b1a;
  --color-dprk: #dc143c;
  --color-iran: #ffaa00;
  --color-other: #00d4ff;

  /* Typography */
  --font-display: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --text-xs: clamp(0.6875rem, 0.65rem + 0.1vw, 0.75rem);
  --text-sm: clamp(0.75rem, 0.72rem + 0.15vw, 0.8125rem);
  --text-base: clamp(0.8125rem, 0.78rem + 0.15vw, 0.875rem);
  --text-lg: clamp(1rem, 0.95rem + 0.2vw, 1.125rem);
  --text-xl: clamp(1.25rem, 1.1rem + 0.5vw, 1.5rem);
  --text-2xl: clamp(1.5rem, 1.3rem + 0.8vw, 2rem);

  /* Spacing */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* Sidebar */
  --sidebar-width: 280px;
  --panel-width: 420px;

  /* Easing */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
}

/* ===== Reset ===== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  font-family: var(--font-display);
  font-size: var(--text-sm);
  color: var(--text-primary);
  background: var(--bg-deep);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  display: flex;
}

button {
  border: none;
  background: none;
  color: inherit;
  cursor: pointer;
  font-family: inherit;
}

input {
  border: none;
  background: none;
  color: inherit;
  font-family: inherit;
  outline: none;
}

a {
  color: var(--accent);
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

::-webkit-scrollbar {
  width: 4px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--text-faint);
  border-radius: 2px;
}

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  height: 100vh;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: transform 0.35s var(--ease-out);
}

.sidebar-header {
  padding: var(--space-4);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
}

.logo {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-title {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.15em;
}

.logo-subtitle {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--text-faint);
  letter-spacing: 0.1em;
}

.sidebar-toggle {
  display: none;
  padding: var(--space-2);
  color: var(--text-muted);
  border-radius: 4px;
  transition: color 0.18s;
}

.sidebar-toggle:hover {
  color: var(--text-primary);
}

.sidebar-content {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: var(--space-4);
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  min-height: 0;
}

.sidebar-footer {
  padding: var(--space-3) var(--space-4);
  border-top: 1px solid var(--border);
  text-align: center;
}

.sidebar-footer a {
  font-size: var(--text-xs);
  color: var(--text-faint);
  transition: color 0.18s;
}

.sidebar-footer a:hover {
  color: var(--accent);
}

/* ===== Search ===== */
.search-wrapper {
  position: relative;
}

.search-icon {
  position: absolute;
  left: var(--space-3);
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-faint);
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: var(--space-2) var(--space-3) var(--space-2) 36px;
  background: var(--bg-surface-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: var(--text-sm);
  color: var(--text-primary);
  transition: border-color 0.18s;
}

.search-input::placeholder {
  color: var(--text-faint);
}

.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-dim);
}

.search-results {
  display: none;
  flex-direction: column;
  gap: 2px;
  max-height: 280px;
  overflow-y: auto;
  overscroll-behavior: contain;
  background: var(--bg-surface-2);
  border: 1px solid var(--border-accent);
  border-radius: 6px;
  padding: var(--space-2);
  position: relative;
  z-index: 10;
}

.search-results.active {
  display: flex;
}

.search-result-item {
  padding: var(--space-2) var(--space-3);
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: var(--space-2);
  background: var(--bg-surface-3);
  transition: background 0.18s;
}

.search-result-item:hover {
  background: var(--bg-hover);
}

.search-result-item .result-name {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--text-primary);
}

.search-result-item .result-country {
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-left: auto;
}

.search-no-results {
  padding: var(--space-3);
  font-size: var(--text-sm);
  color: var(--text-faint);
  text-align: center;
  font-style: italic;
}

.search-show-all {
  justify-content: center;
  color: var(--accent);
  border-top: 1px solid var(--border);
  margin-top: 2px;
  padding-top: var(--space-2);
}

.search-show-all .result-name {
  color: var(--accent) !important;
  font-weight: 600;
}

.search-empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-3);
  padding: var(--space-8) var(--space-4);
  color: var(--text-faint);
  text-align: center;
  grid-column: 1 / -1;
}

.search-empty-state p {
  margin: 0;
  font-size: var(--text-base);
}

.search-empty-hint {
  font-size: var(--text-sm) !important;
  opacity: 0.6;
}

.meta-badge.country-badge {
  border: 1px solid;
  background: transparent;
}

/* ===== Stats Grid ===== */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-2);
}

.stat-card {
  padding: var(--space-3);
  background: var(--bg-surface-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.stat-value {
  font-family: var(--font-mono);
  font-size: var(--text-lg);
  font-weight: 600;
  color: var(--accent);
  font-variant-numeric: tabular-nums lining-nums;
}

.stat-label {
  font-size: var(--text-xs);
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ===== Section Headers ===== */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.section-label {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--text-faint);
  letter-spacing: 0.12em;
  font-weight: 500;
}

.reset-btn {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--accent);
  letter-spacing: 0.05em;
  padding: 2px var(--space-2);
  border-radius: 3px;
  transition: background 0.18s;
}

.reset-btn:hover {
  background: var(--accent-dim);
}

/* ===== Country List ===== */
.country-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.country-item {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.18s;
}

.country-item:hover {
  background: var(--bg-hover);
}

.country-item.active {
  background: var(--accent-dim);
  border: 1px solid var(--border-accent);
}

.country-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.country-name {
  font-size: var(--text-sm);
  color: var(--text-primary);
  flex: 1;
}

.country-count {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--text-muted);
  background: var(--bg-surface-3);
  padding: 1px 6px;
  border-radius: 3px;
}

/* ===== Legend ===== */
.legend {
  padding-bottom: var(--space-2);
}

.legend-row {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-3);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-xs);
  color: var(--text-muted);
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ===== Globe Container ===== */
.globe-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#globe-canvas {
  width: 100%;
  height: 100%;
  display: block;
}

.globe-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* ===== Tooltip ===== */
.tooltip {
  position: absolute;
  display: none;
  padding: var(--space-2) var(--space-3);
  background: rgba(10, 10, 20, 0.92);
  border: 1px solid var(--border-accent);
  border-radius: 6px;
  backdrop-filter: blur(8px);
  pointer-events: none;
  white-space: nowrap;
  z-index: 50;
}

.tooltip.visible {
  display: block;
}

.tooltip-country {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--accent);
}

.tooltip-info {
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-top: 2px;
}

/* ===== Country View ===== */
.country-view {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(10, 10, 15, 0.95);
  backdrop-filter: blur(12px);
  z-index: 20;
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: var(--space-6);
  animation: fadeIn 0.3s var(--ease-out);
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.country-view-header {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  margin-bottom: var(--space-6);
}

.back-btn {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--accent);
  letter-spacing: 0.05em;
  padding: var(--space-2) var(--space-3);
  border: 1px solid var(--border-accent);
  border-radius: 4px;
  transition: background 0.18s;
}

.back-btn:hover {
  background: var(--accent-dim);
}

.country-view-title {
  font-family: var(--font-mono);
  font-size: var(--text-xl);
  font-weight: 600;
  color: var(--text-primary);
}

/* ===== Country Groups Grid ===== */
.country-groups {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--space-4);
}

.group-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: var(--space-4);
  cursor: pointer;
  transition: border-color 0.18s, transform 0.18s var(--ease-out), box-shadow 0.18s;
  position: relative;
  overflow: hidden;
}

.group-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--card-accent, var(--accent));
  opacity: 0.6;
}

.group-card:hover {
  border-color: var(--border-accent);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0, 212, 255, 0.08);
}

.group-card-name {
  font-family: var(--font-mono);
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: var(--space-1);
}

.group-card-apt {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--accent);
  margin-bottom: var(--space-2);
}

.group-card-agency {
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-bottom: var(--space-3);
  line-height: 1.4;
}

.group-card-meta {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
}

.meta-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--bg-surface-3);
  color: var(--text-muted);
  letter-spacing: 0.03em;
}

.meta-badge.members {
  color: var(--accent);
  background: var(--accent-dim);
}

/* ===== Detail Panel ===== */
.detail-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: var(--panel-width);
  max-width: 100vw;
  height: 100vh;
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  z-index: 200;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.35s var(--ease-out);
  box-shadow: -8px 0 32px rgba(0, 0, 0, 0.4);
}

.detail-panel.open {
  transform: translateX(0);
}

.panel-header {
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
}

.close-btn {
  padding: var(--space-2);
  color: var(--text-muted);
  border-radius: 4px;
  transition: color 0.18s, background 0.18s;
}

.close-btn:hover {
  color: var(--text-primary);
  background: var(--bg-hover);
}

.panel-content {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: var(--space-5);
}

/* Panel sections */
.panel-group-header {
  margin-bottom: var(--space-5);
}

.panel-group-name {
  font-family: var(--font-mono);
  font-size: var(--text-xl);
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: var(--space-1);
}

.panel-group-apt {
  font-family: var(--font-mono);
  font-size: var(--text-base);
  color: var(--accent);
  margin-bottom: var(--space-2);
}

.panel-group-country-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-1) var(--space-3);
  border-radius: 4px;
  font-size: var(--text-xs);
  font-weight: 500;
  margin-bottom: var(--space-3);
}

.panel-section {
  margin-bottom: var(--space-5);
}

.panel-section-title {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--text-faint);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: var(--space-3);
  padding-bottom: var(--space-2);
  border-bottom: 1px solid var(--border);
}

.panel-description {
  font-size: var(--text-sm);
  color: var(--text-muted);
  line-height: 1.6;
}

.panel-agency {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  color: var(--accent);
  padding: var(--space-3);
  background: var(--accent-dim);
  border-radius: 6px;
  border: 1px solid var(--border-accent);
}

/* Aliases */
.alias-list {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-1);
}

.alias-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 6px;
  background: var(--bg-surface-3);
  border-radius: 3px;
  color: var(--text-muted);
}

/* Campaigns */
.campaign-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.campaign-item {
  padding: var(--space-2) var(--space-3);
  background: var(--bg-surface-2);
  border-radius: 4px;
  font-size: var(--text-xs);
  color: var(--text-muted);
  line-height: 1.5;
  border-left: 2px solid var(--text-faint);
}

/* Members table */
.members-table {
  width: 100%;
  border-collapse: collapse;
}

.members-table th {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  text-align: left;
  padding: var(--space-2) var(--space-2);
  border-bottom: 1px solid var(--border);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.members-table td {
  font-size: var(--text-xs);
  color: var(--text-muted);
  padding: var(--space-2);
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.members-table td:first-child {
  font-weight: 500;
  color: var(--text-primary);
}

.status-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.status-badge.indicted {
  background: rgba(255, 42, 42, 0.15);
  color: #ff5555;
}

.status-badge.sanctioned {
  background: rgba(255, 170, 0, 0.15);
  color: #ffaa00;
}

.status-badge.identified {
  background: rgba(0, 212, 255, 0.15);
  color: var(--accent);
}

/* Connections */
.connection-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.connection-item {
  padding: var(--space-2) var(--space-3);
  background: var(--bg-surface-2);
  border-radius: 4px;
  font-size: var(--text-xs);
  color: var(--accent);
  cursor: pointer;
  border: 1px solid transparent;
  transition: border-color 0.18s, background 0.18s;
}

.connection-item:hover {
  border-color: var(--border-accent);
  background: var(--accent-dim);
}

/* ===== Mobile Header ===== */
.mobile-header {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 48px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  z-index: 150;
  align-items: center;
  padding: 0 var(--space-3);
  gap: var(--space-3);
}

.mobile-menu-btn, .mobile-back-btn {
  padding: var(--space-2);
  color: var(--text-muted);
}

.mobile-title {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.15em;
}

/* ===== Overlay Background ===== */
.overlay-bg {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.6);
  z-index: 90;
}

.overlay-bg.active {
  display: block;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    transform: translateX(-100%);
    z-index: 200;
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .mobile-header {
    display: flex;
  }

  .globe-container {
    padding-top: 48px;
  }

  .detail-panel {
    width: 100vw;
  }

  .country-view {
    padding: var(--space-4);
  }

  .country-groups {
    grid-template-columns: 1fr;
  }

  .country-view-header {
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-2);
  }
}

/* ===== Animations ===== */
@keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

@keyframes glow {
  0%, 100% { filter: drop-shadow(0 0 2px var(--accent)); }
  50% { filter: drop-shadow(0 0 8px var(--accent)); }
}

/* Loading state */
.loading-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  color: var(--accent);
  letter-spacing: 0.1em;
  animation: pulse 1.5s ease-in-out infinite;
}

</style>
</head>

const searchView = document.getElementById('search-view');

const searchBack = document.getElementById('search-back');

let searchDebounceTimer = null;

function showSearchResults(query, matches) {
  hideCountryView();
  searchViewTitle.textContent = matches.length > 0
    ? `Search: "${query}" — ${matches.length} result${matches.length !== 1 ? 's' : ''}`
    : `Search: "${query}" — No results`;
  searchViewGroups.innerHTML = '';

  if (matches.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'search-empty-state';
    empty.innerHTML = `
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <p>No APT groups match "${query}"</p>
      <p class="search-empty-hint">Try searching by name, APT number, alias, or country</p>
    `;
    searchViewGroups.appendChild(empty);
  } else {
    for (const g of matches) {
      const card = document.createElement('div');
      card.className = 'group-card';
      const color = COUNTRY_CSS_COLORS[g.country] || '#00d4ff';
      card.style.setProperty('--card-accent', color);

      const memberCount = (g.members || []).length;
      const since = g.active_since || 'N/A';
      const displayName = g.apt_number ? `${g.name}` : g.name;
      const subName = g.apt_number || g.crowdstrike_name || '';

      card.innerHTML = `
        <div class="group-card-name">${displayName}</div>
        <div class="group-card-apt">${subName}</div>
        <div class="group-card-agency">${g.agency || 'Unknown'}</div>
        <div class="group-card-meta">
          <span class="meta-badge country-badge" style="border-color:${color};color:${color}">${g.country}</span>
          ${memberCount > 0 ? `<span class="meta-badge members">${memberCount} MEMBERS</span>` : ''}
          <span class="meta-badge">SINCE ${since}</span>
        </div>
      `;

      card.addEventListener('click', () => openGroupDetail(g));
      searchViewGroups.appendChild(card);
    }
  }

  searchView.style.display = 'block';
  closeSidebar();
}

function hideSearchView() {
  searchView.style.display = 'none';
  searchInput.value = '';
}

searchBack.addEventListener('click', hideSearchView);

function handleSearch() {
  const q = searchInput.value.trim().toLowerCase();
  searchResults.innerHTML = '';

  if (q.length < 2) {
    searchResults.classList.remove('active');
    if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
    return;
  }

  const matches = APT_GROUPS.filter(g => {
    const fields = [
      g.name, g.apt_number, g.crowdstrike_name, g.mandiant_name,
      g.microsoft_name, g.country, g.agency,
      ...(g.aliases || [])
    ].filter(Boolean);
    return fields.some(f => f.toLowerCase().includes(q));
  });

  // Show quick preview in sidebar (up to 5 items)
  const preview = matches.slice(0, 5);
  if (preview.length > 0) {
    searchResults.classList.add('active');
    for (const g of preview) {
      const item = document.createElement('div');
      item.className = 'search-result-item';
      const color = COUNTRY_CSS_COLORS[g.country] || '#00d4ff';
      const displayName = g.apt_number ? `${g.name} (${g.apt_number})` : g.name;
      item.innerHTML = `
        <span class="country-dot" style="background:${color}"></span>
        <span class="result-name">${displayName}</span>
        <span class="result-country">${g.country}</span>
      `;
      item.addEventListener('click', () => {
        openGroupDetail(g);
        searchInput.value = '';
        searchResults.classList.remove('active');
        hideSearchView();
      });
      searchResults.appendChild(item);
    }
    // "Show all" button if more results
    if (matches.length > 5) {
      const showAll = document.createElement('div');
      showAll.className = 'search-result-item search-show-all';
      showAll.innerHTML = `<span class="result-name">Show all ${matches.length} results →</span>`;
      showAll.addEventListener('click', () => {
        searchResults.classList.remove('active');
        showSearchResults(searchInput.value.trim(), matches);
      });
      searchResults.appendChild(showAll);
    }
  } else {
    searchResults.classList.add('active');
    const noResult = document.createElement('div');
    noResult.className = 'search-no-results';
    noResult.textContent = 'No matching APT groups';
    searchResults.appendChild(noResult);
  }

  // Auto-open main view after a brief pause of typing
  if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => {
    if (searchInput.value.trim().length >= 2) {
      searchResults.classList.remove('active');
      showSearchResults(searchInput.value.trim(), matches);
    }
  }, 800);
}

searchInput.addEventListener('input', handleSearch);

// Enter key immediately shows results on main screen
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
    const q = searchInput.value.trim().toLowerCase();
    if (q.length < 2) return;
    const matches = APT_GROUPS.filter(g => {
      const fields = [
        g.name, g.apt_number, g.crowdstrike_name, g.mandiant_name,
        g.microsoft_name, g.country, g.agency,
        ...(g.aliases || [])
      ].filter(Boolean);
      return fields.some(f => f.toLowerCase().includes(q));
    });
    searchResults.classList.remove('active');
    showSearchResults(searchInput.value.trim(), matches);
  }
});

// Close sidebar dropdown when clicking outside
document.addEventListener('click', (e) => {
  if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
    searchResults.classList.remove('active');
  }
});

// ── Three.js Globe ──
let scene, camera, renderer, controls, globeMesh;
let countryMarkers = [];
let arcLines = [];
let autoRotate = true;
let raycaster, mouse;
let hoveredMarker = null;
const GLOBE_RADIUS = 5;

function init3D() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0f);

  // Camera
  camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(-3, 4, 12);

  // Renderer
  renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    alpha: false
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(container.clientWidth, container.clientHeight);

  // Controls
  controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.rotateSpeed = 0.5;
  controls.zoomSpeed = 0.8;
  controls.minDistance = 7;
  controls.maxDistance = 25;
  controls.enablePan = false;

  controls.addEventListener('start', () => { autoRotate = false; });

  // Raycaster
  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  // Ambient light
  const ambientLight = new THREE.AmbientLight(0x334466, 1.0);
  scene.add(ambientLight);

  // Directional
  const dirLight = new THREE.DirectionalLight(0x88bbff, 0.8);
  dirLight.position.set(5, 3, 5);
  scene.add(dirLight);

  // Back light
  const backLight = new THREE.DirectionalLight(0x0044aa, 0.3);
  backLight.position.set(-5, -3, -5);
  scene.add(backLight);

  createGlobe();
  createStarField();
  createCountryMarkers();
  createConnectionArcs();

  // Initial rotation to face Eurasia
  scene.rotation.y = -0.6;

  animate();
}

function createGlobe() {
  // Main globe sphere
  const globeGeo = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);
  const globeMat = new THREE.MeshPhongMaterial({
    color: 0x0a0e1a,
    emissive: 0x020408,
    specular: 0x111133,
    shininess: 15,
    transparent: true,
    opacity: 0.95
  });
  globeMesh = new THREE.Mesh(globeGeo, globeMat);
  scene.add(globeMesh);

  // Wireframe grid lines
  const wireGeo = new THREE.SphereGeometry(GLOBE_RADIUS + 0.01, 36, 18);
  const wireMat = new THREE.MeshBasicMaterial({
    color: 0x00d4ff,
    wireframe: true,
    transparent: true,
    opacity: 0.04
  });
  const wire = new THREE.Mesh(wireGeo, wireMat);
  scene.add(wire);

  // Atmosphere glow
  const atmosGeo = new THREE.SphereGeometry(GLOBE_RADIUS + 0.15, 64, 64);
  const atmosMat = new THREE.MeshBasicMaterial({
    color: 0x0066aa,
    transparent: true,
    opacity: 0.06,
    side: THREE.BackSide
  });
  const atmos = new THREE.Mesh(atmosGeo, atmosMat);
  scene.add(atmos);

  // Outer glow ring
  const outerGeo = new THREE.SphereGeometry(GLOBE_RADIUS + 0.4, 64, 64);
  const outerMat = new THREE.MeshBasicMaterial({
    color: 0x003366,
    transparent: true,
    opacity: 0.03,
    side: THREE.BackSide
  });
  const outerGlow = new THREE.Mesh(outerGeo, outerMat);
  scene.add(outerGlow);

  // Load country boundaries
  loadCountryBoundaries();
}

async function loadCountryBoundaries() {
  try {
    const resp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const data = await resp.json();
    const countries = topojsonFeature(data, data.objects.countries);

    for (const feature of countries.features) {
      drawCountryOutline(feature);
    }
  } catch (e) {
    console.warn('Could not load country boundaries:', e);
  }
}

// Minimal topojson decoder
function topojsonFeature(topology, object) {
  const arcs = topology.arcs;
  const transform = topology.transform;
  const features = [];

  function decodeArc(arcIndex) {
    const reversed = arcIndex < 0;
    const arc = arcs[reversed ? ~arcIndex : arcIndex];
    const coords = [];
    let x = 0, y = 0;
    for (const point of arc) {
      x += point[0];
      y += point[1];
      const lng = transform ? x * transform.scale[0] + transform.translate[0] : point[0];
      const lat = transform ? y * transform.scale[1] + transform.translate[1] : point[1];
      coords.push([lng, lat]);
    }
    if (reversed) coords.reverse();
    return coords;
  }

  function decodeRing(ring) {
    const coords = [];
    for (const arcIndex of ring) {
      const arcCoords = decodeArc(arcIndex);
      for (let i = 0; i < arcCoords.length; i++) {
        if (i > 0 || coords.length === 0) {
          coords.push(arcCoords[i]);
        }
      }
    }
    return coords;
  }

  for (const geom of object.geometries) {
    const polygons = [];
    if (geom.type === 'Polygon') {
      polygons.push(geom.arcs.map(decodeRing));
    } else if (geom.type === 'MultiPolygon') {
      for (const poly of geom.arcs) {
        polygons.push(poly.map(decodeRing));
      }
    }
    features.push({
      type: 'Feature',
      id: geom.id,
      properties: geom.properties || {},
      polygons
    });
  }

  return { features };
}

function drawCountryOutline(feature) {
  for (const polygon of feature.polygons) {
    for (const ring of polygon) {
      const points = [];
      for (let i = 0; i < ring.length; i += 2) {
        const [lng, lat] = ring[i];
        const pos = latLngToVector3(lat, lng, GLOBE_RADIUS + 0.02);
        points.push(pos);
      }
      if (points.length > 1) {
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        const mat = new THREE.LineBasicMaterial({
          color: 0x00d4ff,
          transparent: true,
          opacity: 0.18
        });
        const line = new THREE.Line(geo, mat);
        scene.add(line);
      }
    }
  }
}

function createStarField() {
  const starCount = 2000;
  const positions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 40 + Math.random() * 60;
    positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: 0x445577,
    size: 0.15,
    sizeAttenuation: true
  });
  scene.add(new THREE.Points(geo, mat));
}

function latLngToVector3(lat, lng, radius) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lng + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -(radius * Math.sin(phi) * Math.cos(theta)),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

function createCountryMarkers() {
  for (const [country, groups] of Object.entries(groupsByCountry)) {
    const coords = COUNTRY_COORDS[country];
    if (!coords) continue;

    const color = COUNTRY_COLORS[country] || 0x00d4ff;
    const count = groups.length;
    const size = 0.12 + Math.min(count * 0.018, 0.22);
    const pos = latLngToVector3(coords.lat, coords.lng, GLOBE_RADIUS + 0.05);

    // Inner dot
    const dotGeo = new THREE.SphereGeometry(size, 16, 16);
    const dotMat = new THREE.MeshBasicMaterial({
      color,
      transparent: true,
      opacity: 1.0
    });
    const dot = new THREE.Mesh(dotGeo, dotMat);
    dot.position.copy(pos);
    dot.userData = { country, groups, type: 'marker' };
    scene.add(dot);

    // Glow ring
    const ringGeo = new THREE.RingGeometry(size + 0.06, size + 0.16, 32);
    const ringMat = new THREE.MeshBasicMaterial({
      color,
      transparent: true,
      opacity: 0.45,
      side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(pos);
    ring.lookAt(new THREE.Vector3(0, 0, 0));
    scene.add(ring);

    // Pulse ring
    const pulseGeo = new THREE.RingGeometry(size + 0.15, size + 0.22, 32);
    const pulseMat = new THREE.MeshBasicMaterial({
      color,
      transparent: true,
      opacity: 0.25,
      side: THREE.DoubleSide
    });
    const pulse = new THREE.Mesh(pulseGeo, pulseMat);
    pulse.position.copy(pos);
    pulse.lookAt(new THREE.Vector3(0, 0, 0));
    pulse.userData.isPulse = true;
    pulse.userData.baseScale = 1;
    scene.add(pulse);

    countryMarkers.push(dot);
  }
}

// ── Floating country labels (HTML overlay) ──
const labelsContainer = document.createElement('div');
labelsContainer.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;';
container.appendChild(labelsContainer);

const countryLabels = [];
for (const [country, groups] of Object.entries(groupsByCountry)) {
  const coords = COUNTRY_COORDS[country];
  if (!coords) continue;
  const color = COUNTRY_CSS_COLORS[country] || '#00d4ff';
  const label = document.createElement('div');
  label.style.cssText = `position:absolute;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:${color};text-shadow:0 0 6px ${color}66,0 0 12px ${color}33;white-space:nowrap;pointer-events:none;transform:translate(-50%,-100%);padding:2px 4px;opacity:0;transition:opacity 0.3s;`;
  const SHORT_NAMES = {
    'Palestine (Gaza) / regional actor': 'Palestine',
    'Russia (possible) or Central Asian nexus': 'Central Asia'
  };
  const displayName = SHORT_NAMES[country] || country;
  label.textContent = `${displayName} [${groups.length}]`;
  labelsContainer.appendChild(label);
  countryLabels.push({
    el: label,
    lat: coords.lat,
    lng: coords.lng
  });
}

function updateLabels() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  for (const lb of countryLabels) {
    const pos = latLngToVector3(lb.lat, lb.lng, GLOBE_RADIUS + 0.35);
    // Apply scene rotation
    pos.applyEuler(scene.rotation);
    const projected = pos.clone().project(camera);
    const x = (projected.x * 0.5 + 0.5) * w;
    const y = (-projected.y * 0.5 + 0.5) * h;
    // Check if marker is on the front side of the globe
    const behind = projected.z > 1;
    lb.el.style.left = x + 'px';
    lb.el.style.top = y + 'px';
    lb.el.style.opacity = behind ? '0' : '0.9';
  }
}

function createConnectionArcs() {
  // Create arcs between countries that have connected groups
  const connectionPairs = new Set();

  for (const group of APT_GROUPS) {
    if (!group.connections) continue;
    const srcCountry = group.country;
    const srcCoords = COUNTRY_COORDS[srcCountry];
    if (!srcCoords) continue;

    for (const conn of group.connections) {
      // Find connected group's country
      for (const other of APT_GROUPS) {
        if (other.name === group.name) continue;
        const nameMatch = conn.toLowerCase().includes(other.name.toLowerCase()) ||
          (other.crowdstrike_name && conn.toLowerCase().includes(other.crowdstrike_name.toLowerCase()));
        if (nameMatch && other.country !== srcCountry) {
          const dstCoords = COUNTRY_COORDS[other.country];
          if (!dstCoords) continue;
          const key = [srcCountry, other.country].sort().join('|');
          if (!connectionPairs.has(key)) {
            connectionPairs.add(key);
            createArc(srcCoords, dstCoords, 0x00d4ff);
          }
        }
      }
    }
  }
}

function createArc(from, to, color) {
  const start = latLngToVector3(from.lat, from.lng, GLOBE_RADIUS + 0.08);
  const end = latLngToVector3(to.lat, to.lng, GLOBE_RADIUS + 0.08);

  // Calculate midpoint elevated above globe surface
  const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
  const midLen = mid.length();
  const elevation = Math.max(0.8, start.distanceTo(end) * 0.3);
  mid.normalize().multiplyScalar(midLen + elevation);

  const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
  const points = curve.getPoints(50);
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({
    color,
    transparent: true,
    opacity: 0.25
  });
  const line = new THREE.Line(geo, mat);
  line.userData.isArc = true;
  scene.add(line);
  arcLines.push(line);
}

// ── Animation Loop ──
let frameCount = 0;

function animate() {
  requestAnimationFrame(animate);
  frameCount++;

  // Auto-rotate
  if (autoRotate) {
    scene.rotation.y += 0.001;
  }

  // Animate pulse rings
  scene.traverse((child) => {
    if (child.userData && child.userData.isPulse) {
      const t = (Math.sin(frameCount * 0.03) + 1) * 0.5;
      const s = 1 + t * 0.5;
      child.scale.set(s, s, s);
      child.material.opacity = 0.15 * (1 - t * 0.5);
    }
  });

  // Animate arc opacity
  for (const arc of arcLines) {
    const t = (Math.sin(frameCount * 0.02 + arcLines.indexOf(arc)) + 1) * 0.5;
    arc.material.opacity = 0.08 + t * 0.12;
  }

  controls.update();
  updateLabels();
  renderer.render(scene, camera);
}

// ── Mouse Interaction ──
canvas.addEventListener('mousemove', (e) => {
  const rect = container.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(countryMarkers);

  if (intersects.length > 0) {
    const marker = intersects[0].object;
    if (hoveredMarker !== marker) {
      if (hoveredMarker) resetMarkerHover(hoveredMarker);
      hoveredMarker = marker;
      highlightMarker(marker);
    }

    const { country, groups } = marker.userData;
    tooltipEl.classList.add('visible');
    tooltipEl.innerHTML = `
      <div class="tooltip-country">${country}</div>
      <div class="tooltip-info">${groups.length} APT group${groups.length > 1 ? 's' : ''}</div>
    `;
    tooltipEl.style.left = (e.clientX - container.getBoundingClientRect().left + 12) + 'px';
    tooltipEl.style.top = (e.clientY - container.getBoundingClientRect().top - 10) + 'px';
    canvas.style.cursor = 'pointer';
  } else {
    if (hoveredMarker) {
      resetMarkerHover(hoveredMarker);
      hoveredMarker = null;
    }
    tooltipEl.classList.remove('visible');
    canvas.style.cursor = 'grab';
  }
});

canvas.addEventListener('click', (e) => {
  const rect = container.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(countryMarkers);

  if (intersects.length > 0) {
    const { country } = intersects[0].object.userData;
    showCountryView(country);
  }
});

function highlightMarker(marker) {
  marker.material.opacity = 1;
  marker.scale.set(1.4, 1.4, 1.4);
}

function resetMarkerHover(marker) {
  marker.material.opacity = 0.9;
  marker.scale.set(1, 1, 1);
}

// ── Country View ──
function showCountryView(country) {
  hideSearchView();
  const groups = groupsByCountry[country];
  if (!groups) return;

  countryTitle.textContent = `${country} — ${groups.length} APT Groups`;
  countryGroups.innerHTML = '';

  const color = COUNTRY_CSS_COLORS[country] || '#00d4ff';

  for (const g of groups) {
    const card = document.createElement('div');
    card.className = 'group-card';
    card.style.setProperty('--card-accent', color);

    const memberCount = (g.members || []).length;
    const since = g.active_since || 'N/A';

    card.innerHTML = `
      <div class="group-card-name">${g.name}</div>
      <div class="group-card-apt">${g.apt_number || g.crowdstrike_name || ''}</div>
      <div class="group-card-agency">${g.agency || 'Unknown'}</div>
      <div class="group-card-meta">
        ${memberCount > 0 ? `<span class="meta-badge members">${memberCount} MEMBERS</span>` : ''}
        <span class="meta-badge">SINCE ${since}</span>
        ${g.is_summary ? '<span class="meta-badge">SUMMARY</span>' : ''}
      </div>
    `;

    card.addEventListener('click', () => openGroupDetail(g));
    countryGroups.appendChild(card);
  }

  countryView.style.display = 'block';
  resetFilter.style.display = 'inline-block';

  // Highlight country in sidebar
  document.querySelectorAll('.country-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.country-name').textContent === country);
  });

  // Close mobile sidebar if open
  closeSidebar();
}

function hideCountryView() {
  countryView.style.display = 'none';
  resetFilter.style.display = 'none';
  document.querySelectorAll('.country-item').forEach(el => el.classList.remove('active'));
}

backToGlobe.addEventListener('click', hideCountryView);
resetFilter.addEventListener('click', hideCountryView);

// ── Detail Panel ──
function openGroupDetail(group) {
  const color = COUNTRY_CSS_COLORS[group.country] || '#00d4ff';
  const members = group.members || [];
  const campaigns = group.campaigns || [];
  const connections = group.connections || [];
  const aliases = group.aliases || [];

  let html = `
    <div class="panel-group-header">
      <div class="panel-group-name">${group.name}</div>
      ${group.apt_number ? `<div class="panel-group-apt">${group.apt_number}</div>` : ''}
      <div class="panel-group-country-badge" style="background:${color}22;color:${color};border:1px solid ${color}33">
        <span class="country-dot" style="background:${color}"></span>
        ${group.country}
      </div>
    </div>
  `;

  // Agency
  if (group.agency) {
    html += `
      <div class="panel-section">
        <div class="panel-section-title">GOVERNMENT AGENCY</div>
        <div class="panel-agency">${group.agency}</div>
      </div>
    `;
  }

  // Description
  if (group.description) {
    html += `
      <div class="panel-section">
        <div class="panel-section-title">DESCRIPTION</div>
        <p class="panel-description">${group.description}</p>
      </div>
    `;
  }

  // Aliases
  if (aliases.length > 0) {
    html += `
      <div class="panel-section">
        <div class="panel-section-title">ALIASES (${aliases.length})</div>
        <div class="alias-list">
          ${aliases.map(a => `<span class="alias-tag">${escapeHtml(a)}</span>`).join('')}
        </div>
      </div>
    `;
  }

  // Vendor names
  const vendorNames = [];
  if (group.crowdstrike_name) vendorNames.push(`CrowdStrike: ${group.crowdstrike_name}`);
  if (group.mandiant_name) vendorNames.push(`Mandiant: ${group.mandiant_name}`);
  if (group.microsoft_name) vendorNames.push(`Microsoft: ${group.microsoft_name}`);

  if (vendorNames.length > 0) {
    html += `
      <div class="panel-section">
        <div class="panel-section-title">VENDOR NAMES</div>
        <div class="alias-list">
          ${vendorNames.map(v => `<span class="alias-tag">${escapeHtml(v)}</span>`).join('')}
        </div>
      </div>
    `;
  }

  // Members
  if (members.length > 0) {
    html += `
      <div class="panel-section">
        <div class="panel-section-title">KNOWN MEMBERS (${members.length})</div>
        <table class="members-table">
          <thead><tr><th>Name</th><th>Role</th><th>Status</th></tr></thead>
          <tbody>
            ${members.map(m => {
              const s = (m.status || '').toLowerCase();
              let badgeClass = 'identified';
              if (s.includes('indicted')) badgeClass = 'indicted';
              else if (s.includes('sanctioned')) badgeClass = 'sanctioned';
              return `<tr>
                <td>${escapeHtml(m.name)}</td>
                <td>${escapeHtml(m.role || '')}</td>
                <td><span class="status-badge ${badgeClass}">${escapeHtml(m.status || 'unknown')}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  // Campaigns
  if (campaigns.length > 0) {
    html += `
      <div class="panel-section">
        <div class="panel-section-title">NOTABLE CAMPAIGNS (${campaigns.length})</div>
        <div class="campaign-list">
          ${campaigns.map(c => `<div class="campaign-item">${escapeHtml(c)}</div>`).join('')}
        </div>
      </div>
    `;
  }

  // Connections
  if (connections.length > 0) {
    html += `
      <div class="panel-section">
        <div class="panel-section-title">CONNECTIONS (${connections.length})</div>
        <div class="connection-list">
          ${connections.map(c => {
            const linkedGroup = findGroupByConnection(c);
            if (linkedGroup) {
              return `<div class="connection-item" data-group-name="${escapeHtml(linkedGroup.name)}">${escapeHtml(c)}</div>`;
            }
            return `<div class="connection-item" style="cursor:default;color:var(--text-muted)">${escapeHtml(c)}</div>`;
          }).join('')}
        </div>
      </div>
    `;
  }

  panelContent.innerHTML = html;

  // Attach connection click handlers
  panelContent.querySelectorAll('.connection-item[data-group-name]').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.getAttribute('data-group-name');
      const linked = APT_GROUPS.find(g => g.name === name);
      if (linked) openGroupDetail(linked);
    });
  });

  detailPanel.classList.add('open');
}

function findGroupByConnection(connString) {
  const lower = connString.toLowerCase();
  return APT_GROUPS.find(g => {
    if (lower.includes(g.name.toLowerCase())) return true;
    if (g.crowdstrike_name && lower.includes(g.crowdstrike_name.toLowerCase())) return true;
    return false;
  }) || null;
}

function closeDetailPanel() {
  detailPanel.classList.remove('open');
}

closePanel.addEventListener('click', closeDetailPanel);

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Mobile sidebar ──
function openSidebar() {
  sidebar.classList.add('open');
  overlayBg.classList.add('active');
}

function closeSidebar() {
  sidebar.classList.remove('open');
  overlayBg.classList.remove('active');
}

mobileMenuBtn.addEventListener('click', openSidebar);
overlayBg.addEventListener('click', () => {
  closeSidebar();
  closeDetailPanel();
});

mobileBackBtn.addEventListener('click', () => {
  if (detailPanel.classList.contains('open')) {
    closeDetailPanel();
  } else {
    hideCountryView();
  }
});

// ── Resize ──
window.addEventListener('resize', () => {
  if (!camera || !renderer) return;
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// ── Keyboard ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (detailPanel.classList.contains('open')) {
      closeDetailPanel();
    } else if (searchView.style.display !== 'none') {
      hideSearchView();
    } else if (countryView.style.display !== 'none') {
      hideCountryView();
    }
    closeSidebar();
  }
});

// ── Initialize ──
init3D();

  </script>
